name: Update arXiv Feed

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest papers and regenerate feed
        run: npm run update-feed

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/papers.json papers/index.html; then
            echo "No feed changes to commit."
            exit 0
          fi

          git add data/papers.json papers/index.html
          git commit -m "chore: daily update arXiv feed"
          git push
